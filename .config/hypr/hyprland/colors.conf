general {
    col.active_border = rgba(899482AA)
    col.inactive_border = rgba(3f4a3bAA)
}

misc {
    background_color = rgba(0f150dFF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(0f150dFF)
        col.text = rgba(dfe5d7FF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(dfe5d7), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(dfe5d7), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(dfe5d7), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrulev2 = bordercolor rgba(b3ff9dAA) rgba(b3ff9d77),pinned:1
