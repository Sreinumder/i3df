bind = Super+Shift, z, movetoworkspace, special # [hidden] Send to Special Worksapce
bind = Super+ALT+Shift, z, movetoworkspacesilent, special # [hidden] Send to Special Worksapce dont follow

bind = Super+Shift, mouse_down, movetoworkspace, r-1 # [hidden]
bind = Super+Shift, mouse_up, movetoworkspace, r+1 # [hidden]
bind = Super+Alt, mouse_down, movetoworkspace, -1 # [hidden]
