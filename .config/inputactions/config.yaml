    #     - on: update
    #       interval: -40
    #       input:
    #         - keyboard: [leftctrl+y]

    - type: swipe
      fingers: 1
      direction: up_down
      conditions:
        - $finger_1_initial_position_percentage_x <= 0.30
      actions:
        - on: update
          interval: 30
          command: playerctl position 3-
        - on: update
          interval: -20
          command: playerctl position 3+

    # - type: tap
    #   fingers: 1
    #   conditions:
    #     - $finger_1_initial_position_percentage_y <= 0.20
    #     - $finger_1_initial_position_percentage_x <= 0.40
    #   actions:
    #     - on: begin
    #       input:
    #         - keyboard: [leftctrl+c]
    #
    # - type: tap
    #   fingers: 1
    #   conditions:
    #     - $finger_1_initial_position_percentage_y <= 0.20
    #     - $finger_1_initial_position_percentage_x > 0.25
    #     - $finger_1_initial_position_percentage_x <= 0.60
    #   actions:
    #     - on: begin
    #       input:
    #         - keyboard: [leftctrl+v]
    #
    # - type: tap
    #   fingers: 1
    #   conditions:
    #     - $finger_1_initial_position_percentage_y <= 0.20
    #     - $finger_1_initial_position_percentage_x <= 0.40
    #   actions:
    #     - on: begin
    #       input:
    #         - keyboard: [leftctrl+c]
    #
    # - type: swipe
    #   fingers: 1
    #   direction: left_right
    #   conditions:
    #     - $finger_1_initial_position_percentage_y <= 0.20
    #     - $finger_1_initial_position_percentage_x > 0.40
    #     - $finger_1_initial_position_percentage_x <= 0.60
    #   actions:
    #     - on: update
    #       interval: -40
    #       input:
    #         - keyboard: [left]
    #     - on: update
    #       interval: 40
    #       input:
    #         - keyboard: [right]

    - type: tap
      fingers: 1
      conditions:
        - $finger_1_initial_position_percentage_y >= 0.80
      actions:
        - on: begin
          input:
            - keyboard: [leftmeta+grave]

    - type: swipe
      fingers: 1
      direction: left_right
      conditions:
        - $finger_1_initial_position_percentage_x <= 0.40
        - $finger_1_initial_position_percentage_y >= 0.60
      actions:
        - on: update
          interval: -40
          input:
            - keyboard: [left]
        - on: update
          interval: 40
          input:
            - keyboard: [right]

    - type: swipe
      fingers: 1
      direction: up_down
      conditions:
        - $finger_1_initial_position_percentage_x <= 0.40
        - $finger_1_initial_position_percentage_y >= 0.60
      actions:
        - on: update
          interval: -40
          input:
            - keyboard: [up]
        - on: update
          interval: 40
          input:
            - keyboard: [down]

    - type: tap
      fingers: 1
      conditions:
        - $finger_1_initial_position_percentage_x >= 0.85
      actions:
        - on: begin
          input:
            - keyboard: [leftalt+tab]

