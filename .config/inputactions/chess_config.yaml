# https://wiki.inputactions.org/main/config.html
# ----------------------------------------------

device_rules:
  - conditions: $touchpad
    swipe:
      angle_tolerance: 45

touchpad:
  gestures:

    - type: swipe
      fingers: 2
      direction: any
      # resume_timeout: 500
      # conditions:
      #   - $keyboard_modifiers contains alt # only when Alt is held
      clear_modifiers: false
      actions:
        - on: begin
          input:
            # - keyboard: [+leftmeta]
            - mouse: [+left]
        - on: update
          input:
            - mouse: [move_by_delta]
        - on: end_cancel
          input:
            # - keyboard: [-leftmeta]
            - mouse: [-left]

    - type: swipe
      fingers: 3
      direction: any
      # resume_timeout: 500
      # conditions:
      #   - $keyboard_modifiers contains alt # only when Alt is held
      clear_modifiers: false
      actions:
        - on: begin
          input:
            # - keyboard: [+leftmeta]
            - mouse: [+right]
        - on: update
          input:
            - mouse: [move_by_delta]
        - on: end_cancel
          input:
            # - keyboard: [-leftmeta]
            - mouse: [-right]

