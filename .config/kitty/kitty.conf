# Font
font_family      JetBrains Mono Nerd Font
font_size 11.0
background_opacity 1

# Cursor
cursor_shape block
cursor_text_color #A3DB79
cursor_trail 1

# Padding (why weird value? consistency with foot)
window_margin_width 0

# No stupid close confirmation
confirm_os_window_close 0

# Use fish shell
shell zsh
paste_actions replace-dangerous-control-codes

# map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0
map alt+/ kitten toggle_term.py
map alt+g show_last_command_output
map alt+. show_last_visited_command_output
mouse_map ctrl+shift+left press ungrabbed mouse_show_command_output

map alt+tab next_tab
map alt+shift+tab previous_tab
map alt+shift+w close_window
map alt+shift+e next_tab
map alt+shift+q previous_tab
map alt+t new_tab
map alt+; previous_window
map alt+: move_window_forward
map alt+f toggle_fullscreen

# Browse scrollback buffer in nvim
map alt+v show_scrollback

#enable_remote_control yes
#map alt+/ toggle_layout stack

# Browse output of the last shell command in nvim
#map alt+' kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
## Show clicked command output in nvim
#mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

scrollback_pager nvim -u NONE -R -M -c 'lua require("kitty+page")(INPUT_LINE_NUMBER)' -
